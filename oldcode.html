<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>codes.gallery merge test</title>
<style>
html, body {
  margin: 0;
  min-height: 100vh;
  background: #f7f7f7;
}

body {
  position: relative;
  background: #f7f7f7;
  font-family: Arial, Helvetica, sans-serif;
  overflow-x: hidden;
}

.left-stack {
  position: absolute;
  top: 0;
  left: 0;
  padding: 8px 0 0 0;
  color: #000;
  width: 140px;
}

.circle1 {
  height: 100px;
  width: 100px;
  background-color: silver;
  border-radius: 50%;
}

.square {
  height: 50px;
  width: 50px;
  background-color: rgb(251, 255, 0);
}

.circle2 {
  width: 50px;
  height: 50px;
  background: silver;
  border-radius: 50%;
}

.triangle-topleft {
  width: 0;
  height: 0;
  border-top: 100px solid rgb(44, 255, 2);
  border-right: 100px solid transparent;
}

.trapezoid {
  border-bottom: 50px solid rgb(13, 0, 255);
  border-left: 25px solid transparent;
  border-right: 25px solid transparent;
  height: 0;
  width: 100px;
}

.left-stack p {
  margin: 14px 0;
  line-height: 1;
}

.hero {
  position: absolute;
  top: 296px;
  left: 0;
  width: 100vw;
  text-align: center;
  padding: 6px 0 4px;
  box-sizing: border-box;
}

.content {
  display: inline-block;
}

.space-invader {
  width: 1em;
  height: 1em;
  background: red;
  overflow: hidden;
  border: 1px solid red;
  box-shadow:
    0 0 0 1em red,
    0 1em 0 1em red,
    -2.5em 1.5em 0 .5em red,
    2.5em 1.5em 0 .5em red,
    -3em -3em 0 0 red,
    3em -3em 0 0 red,
    -2em -2em 0 0 red,
    2em -2em 0 0 red,
    -3em -1em 0 0 red,
    -2em -1em 0 0 red,
    2em -1em 0 0 red,
    3em -1em 0 0 red,
    -4em 0 0 0 red,
    -3em 0 0 0 red,
    3em 0 0 0 red,
    4em 0 0 0 red,
    -5em 1em 0 0 red,
    -4em 1em 0 0 red,
    4em 1em 0 0 red,
    5em 1em 0 0 red,
    -5em 2em 0 0 red,
    5em 2em 0 0 red,
    -5em 3em 0 0 red,
    -3em 3em 0 0 red,
    3em 3em 0 0 red,
    5em 3em 0 0 red,
    -2em 4em 0 0 red,
    -1em 4em 0 0 red,
    1em 4em 0 0 red,
    2em 4em 0 0 red;
}

.footer {
  position: fixed;
  left: 0;
  bottom: 12px;
  width: 100%;
  text-align: center;
  color: #2f7d32;
  font: 700 14px Montserrat, Arial, sans-serif;
  text-transform: none;
  letter-spacing: normal;
}

.footer a {
  color: #9b0000;
  text-decoration: none;
}
</style>
</head>
<body>

<div class="left-stack">
  <div class="circle1"></div>
  <div class="square"></div>
  <div class="circle2"></div>
  <p>&#9706;</p>
  <p>&#x25A6;</p>
  <br><br><br><br>
  <div class="hero">
    <center>
      <div class="content">
        <div class="space-invader"></div>
      </div>
    </center>
  </div>
  <br><br>
  <p>&#9673;</p>
  <div class="triangle-topleft"></div>
  <p>&#9677;</p>
  <div class="trapezoid"></div>
</div>

<div class="footer">
  <abbr title="With &hearts;">Based</abbr> on the original article from
  <a href="https://css-tricks.com/examples/ShapesOfCSS/">css-tricks.com</a>
  &nbsp;|&nbsp;
  Space Invader <a href="https://codepen.io/dudnikof/pen/pEpKJM">@dudnikof</a>
</div>

</body>
</html>
